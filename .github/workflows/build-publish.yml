name: OpenG2P Build & Publish

# Reusable workflow: builds every Docker image a service repo owns and packages
# its Helm chart, all at ONE version derived from the git ref by
# ci/version/derive-version.sh.
#
# Callers stay ~10 lines and never change when the versioning policy changes;
# pin them to @v1 and move the tag to roll a new policy out to every repo.
#
# Guarantees:
#   * every image and the chart share one version per commit
#   * an immutable version is never overwritten (the run fails instead)
#   * a release (tag N.N.N) is a RETAG of the digest the release line already
#     built and tested -- it is never rebuilt
#
# See ci/README.md for the policy table.

on:
  workflow_call:
    inputs:
      images:
        description: >-
          JSON array of {name, dockerfile, context?, repo?, pins?}.
          `name` labels the build; `repo` overrides the image repository, which
          otherwise defaults to <namespace>/<name>; `pins` is a list of
          {arg, repo, ref} whose git ref is resolved to a SHA, passed as a
          build-arg, and recorded as an org.openg2p.pin.* label.
          Pins are per-image because they describe what is compiled into THAT
          image -- a repo-wide pin would stamp a false provenance label onto
          images that never consume the arg.
        required: true
        type: string
      chart-path:
        description: 'Path to the chart dir. Empty = this repo publishes no chart.'
        required: false
        type: string
        default: ''
      chart-image-paths:
        description: 'JSON array of yq paths in values.yaml to set to the version, e.g. [".image.tag"]'
        required: false
        type: string
        default: '[]'
      chart-oci-repo:
        description: >-
          If set (e.g. oci://ghcr.io/openg2p), the chart is PUSHED to this OCI
          registry instead of the HTTP helm-repo/gh-pages. Consumers install via
          `helm install oci://.../<chart> --version X`. Empty = classic HTTP repo.
        required: false
        type: string
        default: ''
      chart-gitlab-project:
        description: >-
          If set (e.g. openg2p/consent-manager), the chart is pushed to that
          GitLab project's Helm Package Registry (index-based, so Rancher browses
          all chart versions from ONE `helm repo add` URL). The path is
          URL-encoded, so no numeric project id is needed. Takes precedence over
          chart-oci-repo and the gh-pages path.
        required: false
        type: string
        default: ''
      chart-gitlab-host:
        description: 'GitLab base URL for the Helm registry (self-host later). Used only with chart-gitlab-project.'
        required: false
        type: string
        default: 'https://gitlab.com'
      chart-gitlab-channel:
        description: 'GitLab Helm channel to publish under (the segment in the repo-add URL).'
        required: false
        type: string
        default: stable
      artifact-source:
        description: >-
          Where this repo's artifacts live, shown in the changelog catalogue
          (e.g. ghcr.io/openg2p). Cosmetic; empty = not shown.
        required: false
        type: string
        default: ''
      registry:
        required: false
        type: string
        default: docker.io
      namespace:
        required: false
        type: string
        default: openg2p
      platforms:
        required: false
        type: string
        default: linux/amd64
      helm-repo:
        required: false
        type: string
        default: openg2p/openg2p-helm
      helm-repo-branch:
        required: false
        type: string
        default: gh-pages
      helm-repo-url:
        required: false
        type: string
        default: https://openg2p.github.io/openg2p-helm
      packaging-ref:
        description: 'Ref of openg2p-packaging to load ci/ scripts from. Keep in sync with the @ref you call this workflow at.'
        required: false
        type: string
        default: main
      allow-overwrite:
        description: 'Republish a version that already exists. Escape hatch; leave false.'
        required: false
        type: boolean
        default: false
      changelog-repo:
        required: false
        type: string
        default: openg2p/openg2p-packaging
      changelog-branch:
        required: false
        type: string
        default: gh-pages
      changelog_skip_ai:
        description: 'Publish the changelog with human notes only, no AI summary.'
        required: false
        type: boolean
        default: false
      changelog_regenerate:
        description: 'Backfill the AI summary for an already-published version (e.g. 1.0.1). Skips build/publish.'
        required: false
        type: string
        default: ''
    secrets:
      docker_hub_actor:
        required: true
      docker_hub_token:
        required: true
      # GitLab deploy-token (username + token) used when publishing images to the
      # GitLab Container Registry and/or the chart to a GitLab Helm registry.
      gitlab_registry_user:
        required: false
      gitlab_registry_token:
        required: false
      OPENG2P_BOT_GITHUB_PAT:
        required: false
      OPENROUTER_API_KEY:
        required: false
    outputs:
      version:
        value: ${{ jobs.version.outputs.version }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      channel: ${{ steps.v.outputs.channel }}
      frozen: ${{ steps.v.outputs.frozen }}
      alias: ${{ steps.v.outputs.alias }}
      publish_chart: ${{ steps.v.outputs.publish_chart }}
      promote_from: ${{ steps.v.outputs.promote_from }}
      revision: ${{ steps.v.outputs.revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # rev-list --count and the tag lookups need full history
          fetch-tags: true

      - name: Load versioning policy
        uses: actions/checkout@v4
        with:
          repository: openg2p/openg2p-packaging
          ref: ${{ inputs.packaging-ref }}
          path: .openg2p-ci
          sparse-checkout: ci

      - name: Derive version
        id: v
        run: bash .openg2p-ci/ci/version/derive-version.sh

      - name: Summary
        run: |
          echo "### \`${{ steps.v.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|--|" >> "$GITHUB_STEP_SUMMARY"
          echo "| channel | ${{ steps.v.outputs.channel }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frozen | ${{ steps.v.outputs.frozen }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| revision | \`${{ steps.v.outputs.revision }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| chart | ${{ steps.v.outputs.publish_chart }} |" >> "$GITHUB_STEP_SUMMARY"

  images:
    needs: version
    runs-on: ubuntu-latest
    # packages: write lets us push to GHCR with the built-in GITHUB_TOKEN. The
    # CALLER stub must also grant it (permissions are capped by the caller).
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(inputs.images) }}
    name: ${{ matrix.image.name }}
    env:
      IMAGE: ${{ inputs.registry }}/${{ matrix.image.repo || format('{0}/{1}', inputs.namespace, matrix.image.name) }}
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Registry auth, by host:
      #   ghcr.io           -> built-in GITHUB_TOKEN
      #   registry.gitlab.* -> gitlab_registry_user / gitlab_registry_token (deploy token)
      #   anything else     -> docker_hub_actor / docker_hub_token
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry == 'docker.io' && '' || inputs.registry }}
          username: ${{ inputs.registry == 'ghcr.io' && github.actor || startsWith(inputs.registry, 'registry.gitlab') && secrets.gitlab_registry_user || secrets.docker_hub_actor }}
          password: ${{ inputs.registry == 'ghcr.io' && secrets.GITHUB_TOKEN || startsWith(inputs.registry, 'registry.gitlab') && secrets.gitlab_registry_token || secrets.docker_hub_token }}

      # Idempotent guard: SKIP if this exact version was already built from THIS
      # commit (so a re-run safely finishes a partially-published pipeline); FAIL
      # only if it exists from a DIFFERENT commit (real drift). Never overwrites.
      - name: Immutability / idempotency guard
        id: guard
        env:
          REVISION: ${{ needs.version.outputs.revision }}
        run: |
          if docker buildx imagetools inspect "$IMAGE:$VERSION" >/dev/null 2>&1; then
            existing_rev=$(docker buildx imagetools inspect "$IMAGE:$VERSION" \
              --format '{{json .Image}}' 2>/dev/null \
              | jq -r '.config.Labels["org.opencontainers.image.revision"] // ""' 2>/dev/null || true)
            if [ "$existing_rev" = "$REVISION" ]; then
              echo "$IMAGE:$VERSION already built from this commit ($REVISION); skipping (idempotent)."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            elif [ "${{ inputs.allow-overwrite }}" != "true" ]; then
              echo "::error::$IMAGE:$VERSION exists from a DIFFERENT commit (${existing_rev:-unknown} != $REVISION). Immutable versions are never republished."
              exit 1
            else
              echo "::warning::overwriting $IMAGE:$VERSION (allow-overwrite)"
            fi
          fi

      # ---------------- release: promote, never rebuild ----------------
      - name: Promote tested digest to ${{ needs.version.outputs.version }}
        if: needs.version.outputs.frozen == 'true' && steps.guard.outputs.skip != 'true'
        run: |
          src=""
          for cand in ${{ needs.version.outputs.promote_from }}; do
            if docker buildx imagetools inspect "$IMAGE:$cand" >/dev/null 2>&1; then
              src="$cand"; break
            fi
          done
          if [ -z "$src" ]; then
            echo "::error::nothing to promote. Tried: ${{ needs.version.outputs.promote_from }}"
            echo "::error::A release must be tagged on a commit whose images CI already built."
            exit 1
          fi
          echo "Promoting $IMAGE:$src -> $IMAGE:$VERSION (same digest, no rebuild)"
          docker buildx imagetools create -t "$IMAGE:$VERSION" "$IMAGE:$src"
          docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{ .Manifest.Digest }}'

      # ---------------- everything else: build ----------------
      - name: Resolve pinned git refs
        id: pins
        if: needs.version.outputs.frozen != 'true' && steps.guard.outputs.skip != 'true'
        env:
          PINS: ${{ toJSON(matrix.image.pins) }}   # `null` when the image declares none
          DOCKERFILE: ${{ matrix.image.dockerfile }}
        run: |
          args=""; labels=""
          while IFS= read -r pin; do
            [ -n "$pin" ] || continue
            arg=$(jq -r .arg <<<"$pin")
            repo=$(jq -r .repo <<<"$pin")
            ref=$(jq -r .ref <<<"$pin")

            # A build-arg the Dockerfile never declares is silently discarded by
            # buildx -- but we would still stamp an org.openg2p.pin.* label
            # claiming that dependency is inside the image. Refuse.
            if ! grep -qE "^[[:space:]]*ARG[[:space:]]+${arg}([[:space:]]|=|$)" "$DOCKERFILE"; then
              echo "::error::$DOCKERFILE declares no 'ARG $arg'; pinning it would be a false provenance claim"
              exit 1
            fi

            sha=$(git ls-remote "$repo" "$ref" | head -1 | cut -f1)
            [ -n "$sha" ] || sha="$ref"    # already a SHA
            echo "$arg: $ref -> $sha"
            args+="${arg}=${sha}"$'\n'
            key=$(printf '%s' "$arg" | tr '[:upper:]_' '[:lower:]-')
            labels+="org.openg2p.pin.${key}=${sha}"$'\n'
          done < <(jq -c '.[]?' <<<"$PINS")
          { echo "args<<EOF"; printf '%s' "$args"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          { echo "labels<<EOF"; printf '%s' "$labels"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        if: needs.version.outputs.frozen != 'true' && steps.guard.outputs.skip != 'true'
        run: |
          {
            echo "list<<EOF"
            echo "$IMAGE:$VERSION"
            [ -n "${{ needs.version.outputs.alias }}" ] && echo "$IMAGE:${{ needs.version.outputs.alias }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: needs.version.outputs.frozen != 'true' && steps.guard.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context || '.' }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          build-args: ${{ steps.pins.outputs.args }}
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.version.outputs.revision }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            ${{ steps.pins.outputs.labels }}

  chart:
    needs: [version, images]
    if: inputs.chart-path != '' && needs.version.outputs.publish_chart == 'true'
    runs-on: ubuntu-latest
    # packages: write for the OCI push path (harmless for the HTTP path).
    permissions:
      contents: read
      packages: write
    # Serialises this repo's own publishes. It CANNOT serialise across repos --
    # concurrency groups are scoped to a repository -- and gh-pages is shared by
    # all of them, so the push below retries on rejection.
    concurrency:
      group: helm-publish-${{ github.repository }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Pin image tags into values.yaml
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          values="${{ inputs.chart-path }}/values.yaml"
          for path in $(jq -r '.[]' <<<'${{ inputs.chart-image-paths }}'); do
            # The path MUST already exist. yq creates missing keys rather than
            # failing, so a wrong path silently writes a stray key and leaves the
            # real tag at the moving `develop` alias -- i.e. an unpinned chart that
            # still "verifies". Checking existence BEFORE the write is what catches
            # that; checking only after cannot (it reads back the key it created).
            [ "$(yq "$path" "$values")" != "null" ] || {
              echo "::error::$path does not exist in $values. Give the path as it is"
              echo "::error::in values.yaml (e.g. .myApi.image.tag) -- not the template's"
              echo "::error::scoped view (.image.tag). A wrong path ships the chart UNPINNED."
              exit 1; }
            yq -i "$path = strenv(V)" "$values"
            got=$(yq "$path" "$values")
            [ "$got" = "$V" ] || { echo "::error::$path is '$got', expected '$V'"; exit 1; }
            echo "  ok  $path = $V"
          done
          # The repo keeps a placeholder; the real tag exists only in the tarball.
          git --no-pager diff --stat -- "$values" || true

      - name: Stamp source commit into the chart
        env:
          REVISION: ${{ needs.version.outputs.revision }}
          SOURCE: https://github.com/${{ github.repository }}
        run: |
          chart="${{ inputs.chart-path }}/Chart.yaml"
          # Record the commit in the chart itself, so its provenance does not
          # depend on the rev-list ordinal (which merge commits can make
          # ambiguous). Mirrors the OCI labels on the images.
          REVISION="$REVISION" SOURCE="$SOURCE" yq -i '
            .annotations["org.opencontainers.image.revision"] = strenv(REVISION) |
            .annotations["org.opencontainers.image.source"]   = strenv(SOURCE)
          ' "$chart"
          got=$(yq '.annotations["org.opencontainers.image.revision"]' "$chart")
          [ "$got" = "$REVISION" ] || { echo "::error::revision annotation is '$got'"; exit 1; }
          echo "  ok  revision = $REVISION"

      - name: Package
        id: pkg
        run: |
          helm dep up "${{ inputs.chart-path }}"
          helm package "${{ inputs.chart-path }}" --version "$VERSION" --app-version "$VERSION" -d dist/
          ls -l dist/
          chart="${{ inputs.chart-path }}/Chart.yaml"
          echo "name=$(yq '.name' "$chart")" >> "$GITHUB_OUTPUT"
          # Rancher catalog membership is declared by the chart, not the caller.
          # The annotation's value is the empty string, so test for presence.
          if yq -e '.annotations | has("openg2p.org/add-to-rancher")' "$chart" >/dev/null 2>&1; then
            echo "rancher=true" >> "$GITHUB_OUTPUT"
          else
            echo "rancher=false" >> "$GITHUB_OUTPUT"
          fi

      # ============ GitLab Helm registry path (chart-gitlab-project set) ============
      # Index-based Package Registry: Rancher adds ONE `helm repo add` URL and
      # browses every chart + version. Push is an HTTP upload (no `helm push`).
      - name: Publish chart to GitLab Helm registry
        if: inputs.chart-gitlab-project != ''
        env:
          HOST: ${{ inputs.chart-gitlab-host }}
          PROJECT: ${{ inputs.chart-gitlab-project }}
          CHANNEL: ${{ inputs.chart-gitlab-channel }}
          NAME: ${{ steps.pkg.outputs.name }}
          GL_USER: ${{ secrets.gitlab_registry_user }}
          GL_TOKEN: ${{ secrets.gitlab_registry_token }}
        run: |
          if [ -z "${GL_USER:-}" ] || [ -z "${GL_TOKEN:-}" ]; then
            echo "::error::chart-gitlab-project is set but gitlab_registry_user/token secrets are empty."
            exit 1
          fi
          # Address the project by URL-encoded path (group/project -> group%2Fproject)
          # so we never need to look up its numeric id.
          enc=$(printf '%s' "$PROJECT" | sed 's#/#%2F#g')
          base="${HOST}/api/v4/projects/${enc}/packages/helm"
          tgz=$(ls dist/*.tgz | head -1)

          # Idempotency: if already published, the pipeline was here before -- skip
          # (success) so a re-run that finishes a partial publish doesn't fail.
          # Drift is caught upstream by the image guard.
          if curl -fsSL --user "$GL_USER:$GL_TOKEN" "${base}/${CHANNEL}/index.yaml" 2>/dev/null \
               | yq -e ".entries[strenv(NAME)][] | select(.version == strenv(VERSION))" >/dev/null 2>&1; then
            if [ "${{ inputs.allow-overwrite }}" != "true" ]; then
              echo "${NAME} ${VERSION} already published; skipping (idempotent)."
              exit 0
            fi
            echo "::warning::overwriting ${NAME} ${VERSION} (allow-overwrite)"
          fi

          code=$(curl -sS -o /tmp/gl_resp -w '%{http_code}' --request POST \
            --user "$GL_USER:$GL_TOKEN" \
            --form "chart=@${tgz}" \
            "${base}/api/${CHANNEL}/charts")
          echo "HTTP ${code}"; cat /tmp/gl_resp 2>/dev/null || true; echo
          case "$code" in
            2*) : ;;
            *)  echo "::error::GitLab chart upload failed (HTTP ${code})"; exit 1 ;;
          esac
          echo "Published ${NAME} ${VERSION} to ${PROJECT} (channel ${CHANNEL})"
          echo "Consume: helm repo add openg2p ${base}/${CHANNEL} --username <user> --password <token>"

      # ============ OCI publish path (chart-oci-repo set) ============
      - name: Publish chart to OCI registry
        if: inputs.chart-oci-repo != '' && inputs.chart-gitlab-project == ''
        env:
          OCI_REPO: ${{ inputs.chart-oci-repo }}      # e.g. oci://ghcr.io/openg2p
          NAME: ${{ steps.pkg.outputs.name }}
        run: |
          host=$(printf '%s' "$OCI_REPO" | sed -E 's#^oci://##; s#/.*$##')
          echo "$host -> logging in with GITHUB_TOKEN"
          helm registry login "$host" -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          # Idempotency: already published -> skip (success), so a re-run to finish
          # a partial publish doesn't fail. Drift is caught by the image guard.
          if helm pull "${OCI_REPO}/${NAME}" --version "$VERSION" -d /tmp/_exist >/dev/null 2>&1; then
            if [ "${{ inputs.allow-overwrite }}" != "true" ]; then
              echo "${NAME} ${VERSION} already published; skipping (idempotent)."
              exit 0
            fi
            echo "::warning::overwriting ${NAME} ${VERSION} (allow-overwrite)"
          fi
          helm push dist/*.tgz "$OCI_REPO"
          echo "Pushed ${OCI_REPO}/${NAME}:${VERSION}"

      # ============ HTTP/gh-pages publish path (default) ============
      - name: Checkout chart repo
        if: inputs.chart-oci-repo == '' && inputs.chart-gitlab-project == ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm-repo }}
          ref: ${{ inputs.helm-repo-branch }}
          token: ${{ secrets.OPENG2P_BOT_GITHUB_PAT }}
          path: chart-repo

      - name: Chart idempotency guard
        id: ghpages_guard
        if: inputs.chart-oci-repo == '' && inputs.chart-gitlab-project == ''
        env:
          NAME: ${{ steps.pkg.outputs.name }}
        run: |
          # Already in the index? Skip (idempotent) so a re-run finishing a partial
          # publish doesn't fail. Drift is caught upstream by the image guard.
          if yq -e '.entries[strenv(NAME)][] | select(.version == strenv(VERSION))' \
               chart-repo/index.yaml >/dev/null 2>&1; then
            if [ "${{ inputs.allow-overwrite }}" != "true" ]; then
              echo "$NAME $VERSION already published; skipping (idempotent)."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::overwriting $NAME $VERSION (allow-overwrite)"
            fi
          fi

      - name: Publish
        if: inputs.chart-oci-repo == '' && inputs.chart-gitlab-project == '' && steps.ghpages_guard.outputs.skip != 'true'
        env:
          BRANCH: ${{ inputs.helm-repo-branch }}
          URL: ${{ inputs.helm-repo-url }}
          RANCHER: ${{ steps.pkg.outputs.rancher }}
        run: |
          cd chart-repo
          git config user.name "openg2p-bot"
          git config user.email "bot@openg2p.org"

          # Every repo in the org pushes to this one branch, so a concurrent
          # publish will reject ours. Rebuild on top of theirs and retry.
          attempt() {
            git fetch -q origin "$BRANCH"
            git reset -q --hard "origin/$BRANCH"

            cp ../dist/*.tgz .
            # Full regeneration, NOT `helm repo index --merge`. --merge appends
            # rather than replaces, which is how this index ended up with two
            # `0.0.0-develop` entries for the same chart pointing at different
            # digests. Regenerating is safe here because every .tgz is present.
            helm repo index . --url "$URL"

            if [ "$RANCHER" = "true" ]; then
              # The Rancher index must use --merge: its .tgz files are deleted
              # after indexing, so there is nothing to regenerate from. That is
              # only safe because versions are immutable -- --merge duplicates an
              # entry exactly when the same version is published twice, which the
              # overwrite guard above prevents.
              cp ../dist/*.tgz rancher/
              helm repo index --url ../ --merge rancher/index.yaml rancher
              rm -f rancher/*.tgz
            fi

            git add -A
            git diff --quiet --cached && { echo "nothing to publish"; return 0; }
            git commit -q -m "publish ${{ github.repository }} $VERSION"
            git push -q origin "HEAD:$BRANCH"
          }

          for i in 1 2 3 4 5; do
            if attempt; then exit 0; fi
            echo "::warning::push rejected (attempt $i), retrying"
            sleep $(( RANDOM % 10 + 5 ))
          done
          echo "::error::could not publish $VERSION to $BRANCH after 5 attempts"
          exit 1

  changelog:
    needs: [version, images]
    # Changelog follows the chart: anything deployable (develop, RC, release) is
    # documented. develop -> rolling Unreleased; RC -> durable per-RC page;
    # release tag -> frozen page. Feature branches publish no chart, so they are
    # skipped (traced via image labels). A manual regenerate bypasses the gate.
    if: >-
      always() &&
      needs.version.result == 'success' &&
      (needs.images.result == 'success' || inputs.changelog_regenerate != '') &&
      (inputs.changelog_regenerate != '' ||
       needs.version.outputs.channel == 'develop' ||
       needs.version.outputs.channel == 'rc' ||
       needs.version.outputs.frozen == 'true')
    runs-on: ubuntu-latest
    # One repo's changelog pushes are serialised against each other; the shared
    # branch is handled by the retry loop below (concurrency can't span repos).
    concurrency:
      group: changelog-${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Load changelog scripts
        uses: actions/checkout@v4
        with:
          repository: openg2p/openg2p-packaging
          ref: ${{ inputs.packaging-ref }}
          path: .openg2p-ci
          sparse-checkout: ci

      - name: Read summariser config
        id: cfg
        run: |
          f=.openg2p-ci/ci/changelog/config.yml
          echo "model=$(yq '.model' "$f")" >> "$GITHUB_OUTPUT"
          echo "fallbacks=$(yq '.fallbacks | join(",")' "$f")" >> "$GITHUB_OUTPUT"
          echo "max_tokens=$(yq '.max_tokens' "$f")" >> "$GITHUB_OUTPUT"
          echo "jira_base=$(yq '.jira_base // ""' "$f")" >> "$GITHUB_OUTPUT"
          echo "jira_project=$(yq '.jira_project // ""' "$f")" >> "$GITHUB_OUTPUT"

      - name: Checkout changelog branch
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.changelog-repo }}
          ref: ${{ inputs.changelog-branch }}
          token: ${{ secrets.OPENG2P_BOT_GITHUB_PAT }}
          path: changelog-pages

      - name: Build changelog
        id: run
        env:
          REPO: ${{ github.event.repository.name }}
          VERSION: ${{ needs.version.outputs.version }}
          FROZEN: ${{ needs.version.outputs.frozen }}
          REVISION: ${{ needs.version.outputs.revision }}
          PAGES_DIR: ${{ github.workspace }}/changelog-pages
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ARTIFACT_SOURCE: ${{ inputs.artifact-source }}
          SKIP_AI: ${{ inputs.changelog_skip_ai }}
          REGEN_VERSION: ${{ inputs.changelog_regenerate }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ steps.cfg.outputs.model }}
          OPENROUTER_FALLBACKS: ${{ steps.cfg.outputs.fallbacks }}
          MAX_TOKENS: ${{ steps.cfg.outputs.max_tokens }}
          JIRA_BASE: ${{ steps.cfg.outputs.jira_base }}
          JIRA_PROJECT: ${{ steps.cfg.outputs.jira_project }}
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ] && [ "${SKIP_AI}" != "true" ]; then
            echo "::warning::OPENROUTER_API_KEY not set; publishing human notes only"
            export SKIP_AI=true
          fi
          DATE="$(date -u +%Y-%m-%d)" bash .openg2p-ci/ci/changelog/run.sh

      - name: Publish to changelog branch
        if: steps.run.outputs.published == 'true'
        env:
          BRANCH: ${{ inputs.changelog-branch }}
          VERSION: ${{ needs.version.outputs.version }}
          REPO: ${{ github.event.repository.name }}
        working-directory: changelog-pages
        run: |
          git config user.name "openg2p-bot"
          git config user.email "bot@openg2p.org"
          # Regenerate our files onto the latest branch tip each attempt: many
          # repos push here, and per-repo folders keep conflicts rare.
          src="${{ github.workspace }}/changelog-pages"
          attempt() {
            git fetch -q origin "$BRANCH"
            git stash -q --include-untracked || true
            git reset -q --hard "origin/$BRANCH"
            git stash pop -q 2>/dev/null || true
            git add -A
            git diff --quiet --cached && { echo "no changelog change"; return 0; }
            git commit -q -m "changelog: ${REPO} ${VERSION}"
            git push -q origin "HEAD:$BRANCH"
          }
          for i in 1 2 3 4 5; do
            if attempt; then exit 0; fi
            echo "::warning::changelog push rejected (attempt $i), retrying"
            sleep $(( RANDOM % 10 + 5 ))
          done
          echo "::error::could not publish changelog after 5 attempts"
          exit 1
