# Canonical caller stub — drop this at .github/workflows/build-publish.yml in a
# service repo (and delete the old docker-build*.yml / helm-publish.yml).
#
# The file has TWO parts:
#   * IDENTICAL BOILERPLATE — the same in every repo (triggers, the two changelog
#     dispatch inputs + their wording, secret forwarding, packaging-ref). Keep it
#     byte-for-byte identical across repos so the "Run workflow" dialog reads the
#     same everywhere. (GitHub renders that dialog from THIS file's
#     workflow_dispatch inputs — a reusable workflow cannot supply them, so they
#     must live here, not in openg2p-packaging.)
#   * PER-REPO DECLARATIONS — images / chart-path / chart-image-paths / pins.
#     Only these change between repos.
#
# All versioning/changelog LOGIC lives in openg2p-packaging@v1; this stub holds
# none and should rarely change. iam-service values are shown as a concrete
# example — replace the PER-REPO block for your repo.

name: Build & Publish

# ---- IDENTICAL BOILERPLATE (do not customise per repo) ----------------------
# The two inputs are for occasional changelog fixes only. For a normal run leave
# the checkbox OFF and the text box EMPTY (it rebuilds/publishes the branch).
on:
  push:
    branches: ["**"]
    tags: ["**"]
  workflow_dispatch:
    inputs:
      changelog_skip_ai:
        description: 'Skip the AI summary — publish the changelog from commit messages only (use when AI is unavailable). Leave OFF for a normal run.'
        type: boolean
        default: false
      changelog_regenerate:
        description: 'Backfill the AI summary for a release that published without one: enter its frozen version e.g. 1.0.1 (not a develop version). Leave EMPTY for a normal run.'
        type: string
        default: ''

jobs:
  build-publish:
    uses: openg2p/openg2p-packaging/.github/workflows/build-publish.yml@v1
    with:
      # --- IDENTICAL BOILERPLATE ---
      changelog_skip_ai: ${{ inputs.changelog_skip_ai || false }}
      changelog_regenerate: ${{ inputs.changelog_regenerate || '' }}
      packaging-ref: v1

      # --- PER-REPO DECLARATIONS (customise below for your repo) ---
      # One entry per Docker image. `pins` (per image) resolve a build-arg that is
      # a git ref to a SHA — add it only to images whose Dockerfile declares that
      # ARG, or you stamp a false provenance label onto images that never use it.
      images: |
        [
          {"name": "iam-staff-portal-api",
           "repo": "openg2p/iam-staff-portal-api",
           "dockerfile": "docker/iam-staff-portal-api/Dockerfile",
           "pins": [
             {"arg": "FASTAPI_COMMON_REF",
              "repo": "https://github.com/openg2p/openg2p-fastapi-common",
              "ref": "1.1"}
           ]},
          {"name": "iam-agent-portal-api",
           "repo": "openg2p/iam-agent-portal-api",
           "dockerfile": "docker/iam-agent-portal-api/Dockerfile"},
          {"name": "iam-bene-portal-api",
           "repo": "openg2p/iam-bene-portal-api",
           "dockerfile": "docker/iam-bene-portal-api/Dockerfile"}
        ]
      chart-path: deployments/charts/openg2p-iam-service
      chart-image-paths: '[".image.tag"]'

    # ---- IDENTICAL BOILERPLATE ----
    secrets:
      docker_hub_actor: ${{ secrets.docker_hub_actor }}
      docker_hub_token: ${{ secrets.docker_hub_token }}
      OPENG2P_BOT_GITHUB_PAT: ${{ secrets.OPENG2P_BOT_GITHUB_PAT }}
      # Org-level secret; if unset the changelog still publishes human notes.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
